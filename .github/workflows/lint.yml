name: lint

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: pre-commit/action@v3.0.1

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest
      - name: Run tests
        # Tests that require Isaac Lab are skipped automatically when it is not installed.
        run: pytest tests -q
